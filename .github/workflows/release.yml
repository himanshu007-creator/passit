name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-cratesio:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    name: Build and upload binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf passit-${{ matrix.target }}.tar.gz passit
          echo "artifact=target/${{ matrix.target }}/release/passit-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - name: Archive (Windows)
        if: matrix.archive == 'zip'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/passit.exe -DestinationPath passit-${{ matrix.target }}.zip
          echo "artifact=passit-${{ matrix.target }}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.artifact }}

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  publish-smithery:
    name: Publish MCPB to Smithery
    needs: [publish-cratesio, build-binaries]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package MCPB bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p .mcpb/bin
          cp "target/x86_64-unknown-linux-gnu/release/passit" .mcpb/bin/

          cat > .mcpb/manifest.json << JSONEOF
          {
            "id": "passit",
            "name": "passit",
            "version": "${VERSION}",
            "description": "Pass conversations between AI agents — grab, drop, and continue seamlessly",
            "author": "himanshu007-creator",
            "homepage": "https://github.com/himanshu007-creator/passit",
            "entrypoint": {
              "command": "passit",
              "args": [],
              "transport": "stdio"
            },
            "platforms": ["linux"],
            "permissions": ["filesystem:read", "filesystem:write"],
            "config": {
              "schema": {
                "type": "object",
                "properties": {
                  "agentId": {
                    "type": "string",
                    "default": "opencode",
                    "description": "Identifier for this agent instance (e.g. claude-code, opencode)"
                  }
                }
              }
            }
          }
          JSONEOF

          cd .mcpb && tar czf ../passit.mcpb .

      - name: Publish to Smithery
        env:
          SMITHERY_KEY: ${{ secrets.SMITHERY_KEY }}
        run: |
          if [ -z "${SMITHERY_KEY}" ]; then
            echo "SMITHERY_KEY not set — skipping Smithery publish"
            exit 0
          fi
          npx -y @anthropic-ai/mcpb publish passit.mcpb --key "${SMITHERY_KEY}"
